name: scrape

on:
  schedule:
    # 1 日 1 回。21:00 UTC = 06:00 JST (毎朝)。
    # ・private repo の GitHub Actions 無料枠は 2000 分/月。1回 ~11分なので
    #   1日1回 = 月 ~330分 と大余裕 (30分間隔だと月 ~3600分で枠超過していた)。
    # ・空き家バンクは良物件でも数日は残るため、1日1回で取りこぼしほぼ無し。
    # ・cron は UTC 基準、高負荷時 5〜15 分の遅延あり。
    # ・手動で今すぐ走らせたいときは Actions タブから "Run workflow" (workflow_dispatch)。
    - cron: '0 21 * * *'
  workflow_dispatch: {}

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 27 source / 4自治体 詳細fetch型 (yabu_indep ~50s + higashiyoshino ~50s +
    # totsukawa ~30s + ieichiba ~30s) で 8-9 分かかる。15 分に余裕を持つ。
    # private repo の Actions 枠 (2000分/月) は実消費時間 × cron 回数で決まる
    # (timeout 値は上限なので消費に影響しない)。
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        run: |
          if [ -z "$TURSO_DATABASE_URL" ]; then
            echo "::error::TURSO_DATABASE_URL secret not set. See DEPLOY.md."
            exit 1
          fi

      - name: Install
        run: pip install -e .

      - name: Run scrape
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python -m src.cli scrape
