name: scrape

on:
  schedule:
    # 30 分間隔。
    # ・private repo の GitHub Actions 無料枠は 2000 分/月。
    #   15 分間隔だと枠超過リスクがあるため 30 分に。
    # ・notify が毎時00分にまとめるため、scrape 頻度 15→30 は実害なし。
    # ・cron は UTC 基準、高負荷時 5〜15 分の遅延あり。
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 13 自治体追加で yabu_indep の詳細 fetch (~50s) など増えたため 10 分に。
    # 通常は 5-7 分で完了、超えた場合の保険値。
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        run: |
          if [ -z "$TURSO_DATABASE_URL" ]; then
            echo "::error::TURSO_DATABASE_URL secret not set. See DEPLOY.md."
            exit 1
          fi

      - name: Install
        run: pip install -e .

      - name: Run scrape
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python -m src.cli scrape
