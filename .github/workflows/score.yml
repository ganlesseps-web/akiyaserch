name: score

on:
  schedule:
    # scrape (毎時 0 / 30 分) の少し後 → scrape の新規物件を採点
    - cron: '10,40 * * * *'
  workflow_dispatch: {}

concurrency:
  group: score
  cancel-in-progress: false

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          missing=""
          [ -z "$TURSO_DATABASE_URL" ] && missing="$missing TURSO_DATABASE_URL"
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          if [ -n "$missing" ]; then
            echo "::warning::Skipping AI scoring (missing:$missing). Configure in repo Secrets to enable."
            exit 0
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install with AI extras
        run: pip install -e ".[ai]"

      - name: Run scoring
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.cli score --limit 50
