name: notify

on:
  schedule:
    # scrape (06:00 JST) の直後に通知 + 夕方に保険の2回。
    # ・21:30 UTC = 06:30 JST: 朝の scrape 完了 (~11分) 直後にダイジェスト送信。
    # ・09:00 UTC = 18:00 JST: GitHub のスケジュール遅延で朝に取りこぼした分の保険。
    # ・notify は idempotent (通知済みは再送しない) なので2回でも二重通知にならない。
    # ・1回 ~0.5分 × 2回/日 = 月 ~30分 と軽量。
    - cron: '30 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch: {}

concurrency:
  group: notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          missing=""
          [ -z "$TURSO_DATABASE_URL" ] && missing="$missing TURSO_DATABASE_URL"
          [ -z "$DISCORD_WEBHOOK_URL" ] && missing="$missing DISCORD_WEBHOOK_URL"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing. See DEPLOY.md."
            exit 1
          fi

      - name: Install
        run: pip install -e .

      - name: Run notify
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python -m src.cli notify
