name: notify

on:
  schedule:
    # 毎時 00 分。UTC 基準だがダイジェスト通知なので時刻ズレは問題なし。
    - cron: '0 * * * *'
  workflow_dispatch: {}

concurrency:
  group: notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify secrets
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          missing=""
          [ -z "$TURSO_DATABASE_URL" ] && missing="$missing TURSO_DATABASE_URL"
          [ -z "$DISCORD_WEBHOOK_URL" ] && missing="$missing DISCORD_WEBHOOK_URL"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing. See DEPLOY.md."
            exit 1
          fi

      - name: Install
        run: pip install -e .

      - name: Run notify
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python -m src.cli notify
