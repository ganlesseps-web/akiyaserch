# AI スコアリング用の好み定義。Claude (Haiku) がこの内容を基準に物件を 0-10 で採点する。
# 自由形式で書いてOK。具体的な方が精度が上がる (例: 「平地」「築年数」「日当たり」など)。

description: |
  【好み】
  - 平地、緩やかな傾斜まで。山奥や急斜面はNG。
  - 市街地中心から車で30分以内、もしくは駅徒歩15分以内。
  - 田畑付き、自家菜園できる広さの土地 (50坪以上) があると嬉しい。
  - 海・川・温泉が近いと加点。
  - 築60年以内が理想だが、構造に致命的問題なければ築古OK。
  - 接道○、再建築可。

  【避けたい】
  - 市街化調整区域 (内のみで再建築不可)
  - 山奥・冬季積雪多い地域
  - 解体前提物件
  - 事故物件、未告知瑕疵
  - 私道・接道なし

# このスコア以上を Discord に通知する (0 にすれば全件通知、10 で実質オフ)
score_threshold: 6

# 利用するモデル (Haiku 4.5 = 速くて安い、Sonnet 4.6 = 精度高い)
model: claude-haiku-4-5-20251001
