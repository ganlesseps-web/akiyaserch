# 通知対象フィルタ
# 条件は (price <= price_max) AND (prefecture in allowlist OR within drive_time_hours from origin)

# 価格上限（円）
price_max: 3000000

# 価格下限（円）。0 円物件は本体無料でも修繕費+取得税で結局数百万かかるため、
# 初心者には「リフォーム済 50万〜」帯が現実的にお得。0 にすれば下限なし。
price_min: 500000

# 通知対象の都道府県 allowlist
# 大阪駅から車2時間圏内の府県をベースに、ユーザー任意で追加
prefectures:
  # 大阪駅から車2時間圏内（高速利用）
  - 大阪府
  - 京都府
  - 兵庫県
  - 奈良県
  - 和歌山県
  - 滋賀県
  - 三重県
  - 徳島県
  - 香川県
  - 岡山県
  # 移住目的での追加 (2時間圏外、補助金充実エリア)
  - 山梨県    # 北杜市 (八ヶ岳移住)、上野原市 など
  - 高知県    # 本山町 (嶺北・ゆず) など
  - 山口県    # 美祢市 (秋吉台) など

# 境界判定（後で実装）: allowlist に含まれていても
# Distance Matrix API で 2時間超なら除外する府県
borderline_prefectures:
  - 三重県
  - 岡山県
  - 徳島県
  - 香川県

# 大阪駅 を起点に車2時間 (秒) 以内のみ通すしきい値
drive_origin: "大阪駅, 大阪府大阪市北区梅田3丁目1-1"
drive_max_seconds: 7200

# 物件タイトル/本文に含まれていたら除外する NG ワード
ng_keywords:
  - 事故物件
  - 市街化調整区域内のみ
  # - 再建築不可  # 必要に応じて
  # 海沿い物件 (淡路島など島自体は OK、海から徒歩距離 or 海ビューが売りの物件は NG)
  - 海沿い
  - 海岸沿い
  - 海岸まで徒歩
  - 海まで徒歩
  - 海まで歩いて
  - ビーチ直結
  - ビーチまで徒歩
  - 漁港の隣
  - 漁港沿い
  - 波の音が聞こえる
  - 波の音を聴き
  - 砂浜まで
  - 海辺の家
  - 海の絶景
  - 海絶景
  - 海眺望
  - オーシャンビュー
  - 海一望
  - 高台から海

# 通す物件タイプ。normalize.classify_property_type で判定された値が
# このリストに含まれていれば通過。空リスト [] なら全許可。
# 候補: house / apartment / commercial / land / unknown
property_types:
  - house

# True にすると normalize.is_dilapidated で「オンボロ」判定された物件を通知対象から除外。
# 判定キーワード: 雨漏りあり / 腐食あり / シロアリ被害 / 解体前提 / 廃屋 / 大規模リフォーム必要 等
# (否定文脈 "雨漏り対策済" "雨漏りはありません" 等は通過させる)
exclude_dilapidated: true

# 市町村 blacklist: 海沿いで塩害・シロアリ・湿気で家が傷みやすい自治体を丸ごと除外。
# (city フィールドは normalize._extract_city が「太地町」「串本町」「○○市」を抽出)
# allowlist された府県内であっても、ここに載っている市町村は通知対象外になる。
#
# 方針: 「市の大半が海沿いで内陸エリアがほとんどない自治体」のみ blacklist。
# 京丹後/舞鶴/与謝野/古座川などユーザー指定済の自治体は内陸エリアもあるため除外しない。
# 個別の海沿い物件除外は ng_keywords (オーシャンビュー等) で対応。
city_blacklist:
  # 和歌山県・南紀沿岸 (太平洋・紀伊水道に直接面し、内陸エリア少ない小自治体)
  - 太地町       # 鯨の町、半島突端
  - 那智勝浦町   # 海岸沿い
  - 串本町       # 本州最南端、海に囲まれる
  - 白浜町       # 太平洋沿岸、観光地
  - 美浜町       # 紀伊水道、海沿い小自治体
  - 由良町       # 紀伊水道、海沿い小自治体
  - 広川町       # 紀伊水道
  - 湯浅町       # 紀伊水道、湯浅湾
  # 三重県・南伊勢〜熊野沿岸 (リアス海岸・太平洋沿岸の小自治体)
  - 鳥羽市       # リアス海岸、島嶼部
  - 志摩市       # リアス海岸
  - 尾鷲市       # 太平洋沿岸、雨多い
  - 紀北町       # 海岸線が大半
  - 南伊勢町     # 海岸線が大半
  - 御浜町       # 海岸沿い
  - 紀宝町       # 海岸沿い
  # 京都府・北部
  - 伊根町       # 舟屋集落、町全体が海沿い
  # 大阪府
  - 岬町         # 大阪府最南端、海岸沿い
  # 兵庫県は淡路島・湾岸あるが内陸エリア豊富、ユーザー判断で個別検討 (除外しない)
  # 山口県・日本海沿岸 (山口市/美祢市は内陸、blacklist 対象外)
  - 長門市       # 日本海沿岸、海岸線が大半
  # 萩市/下関市は city 部に内陸エリアあり、blacklist 入れない (NG keyword で個別対応)
  # 長野・山梨・滋賀・奈良は海なし、blacklist 不要

# 通知頻度（毎時00分のバッチ）
notify:
  cron: "0 * * * *"  # 毎時00分
  batch_minutes: 60  # この時間内に貯まった新着をまとめる
  digest_threshold: 10  # 10件超なら個別→ダイジェストへ
